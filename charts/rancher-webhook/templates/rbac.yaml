apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rancher-webhook
rules:
# --- Read-only: informer caches for validators/mutators ---
- apiGroups: ["management.cattle.io"]
  resources:
    - authconfigs
    - clusters
    - clusterproxyconfigs
    - clusterroletemplatebindings
    - features
    - globalroles
    - globalrolebindings
    - nodes
    - podsecurityadmissionconfigurationtemplates
    - projects
    - projectroletemplatebindings
    - roletemplates
    - settings
    - tokens
    - userattributes
    - users
  verbs: [get, list, watch]
- apiGroups: ["provisioning.cattle.io"]
  resources: [clusters]
  verbs: [get, list, watch, patch]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: [roles, rolebindings, clusterroles, clusterrolebindings]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [namespaces, secrets]
  verbs: [get, list, watch]
- apiGroups: ["rke.cattle.io"]
  resources: [etcdsnapshots]
  verbs: [get, list, watch]
- apiGroups: ["apiregistration.k8s.io"]
  resources: [apiservices]
  verbs: [get, list, watch]
- apiGroups: ["apiextensions.k8s.io"]
  resources: [customresourcedefinitions]
  verbs: [get, list, watch]
- apiGroups: ["cluster.x-k8s.io"]
  resources: [machinedeployments, clusters]
  verbs: [get, list, watch]
- apiGroups: ["rke-machine-config.cattle.io"]
  resources: ["*"]
  verbs: [get, list, watch]
- apiGroups: ["rke-machine.cattle.io"]
  resources:
    - amazonec2machines
    - azuremachines
    - digitaloceanmachines
    - harvestermachines
    - linodemachines
    - vmwarevspheremachines
  verbs: [get, list, watch]
- apiGroups: ["catalog.cattle.io"]
  resources: [clusterrepos]
  verbs: [get, list, watch]
- apiGroups: ["auditlog.cattle.io"]
  resources: [auditpolicies]
  verbs: [get, list, watch]
- apiGroups: ["cluster.cattle.io"]
  resources: [clusterauthtokens]
  verbs: [get, list, watch]
# --- Write operations ---
- apiGroups: ["authorization.k8s.io"]
  resources: [subjectaccessreviews]
  verbs: [create]
- apiGroups: [""]
  resources: [namespaces]
  verbs: [create]
- apiGroups: [""]
  resources: [secrets]
  verbs: [create, update, delete]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: [roles]
  verbs: [update]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: [rolebindings, clusterrolebindings]
  verbs: [create]
# The fleetworkspace mutator creates a per-workspace ClusterRole and binds it (plus the
# fleet-admin ClusterRole) to the workspace creator. Those grants include permissions the
# webhook ServiceAccount does not itself hold (fleet.cattle.io/*), so Kubernetes RBAC
# escalation prevention requires escalate (to create the ClusterRole) and bind (to reference
# it from a [Cluster]RoleBinding).
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: [clusterroles]
  verbs: [create, escalate, bind]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rancher-webhook-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rancher-webhook
subjects:
- kind: ServiceAccount
  name: rancher-webhook
  namespace: {{.Release.Namespace}}
